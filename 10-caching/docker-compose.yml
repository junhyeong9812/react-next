services:
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    environment:
      API_KEY: demo-secret-key
      LOG_REQUESTS: "true"

  react:
    build: ./react
    ports:
      - "3011:3000"
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://localhost:8080

  next:
    build: ./next
    ports:
      - "3012:3000"
    depends_on:
      - backend
    environment:
      API_BASE: http://backend:8080
