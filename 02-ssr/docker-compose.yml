services:
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    environment:
      API_KEY: demo-secret-key

  react:
    build: ./react
    ports:
      - "3101:3000"
    depends_on:
      - backend
    environment:
      API_BASE: http://backend:8080

  next:
    build: ./next
    ports:
      - "3102:3000"
    depends_on:
      - backend
    environment:
      API_BASE: http://backend:8080
