services:
  backend:
    build: ../backend
    # 이 phase에선 의도적으로 외부 포트 매핑도 해 둔다.
    # React 클라가 브라우저에서 직접 호출해야 하므로 localhost:8080이 필요함.
    ports:
      - "8080:8080"
    environment:
      API_KEY: demo-secret-key

  react:
    build:
      context: ./react
      args:
        # Vite는 빌드 타임에 번들에 박제되므로 build args로 주입한다.
        VITE_API_BASE: http://localhost:8080
    ports:
      - "3601:3000"
    depends_on:
      - backend

  next:
    build: ./next
    ports:
      - "3602:3000"
    depends_on:
      - backend
    environment:
      # 서버(Next Route Handler)에서만 사용 → 클라 번들에 박제되지 않음
      API_BASE: http://backend:8080
      API_KEY: demo-secret-key
